<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>LLaMb Page Analyzer</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            min-width: 320px;
            background: #f8fafc;
            color: #0f172a;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        .shell {
            padding: 18px;
        }

        .header {
            margin-bottom: 16px;
        }

        .title {
            font-size: 20px;
            font-weight: 800;
        }

        .subtitle {
            margin-top: 6px;
            color: #64748b;
            font-size: 13px;
            line-height: 1.5;
        }

        .panel {
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 16px;
            padding: 16px;
            box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
        }

        .btn {
            width: 100%;
            border: none;
            border-radius: 12px;
            padding: 12px 14px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
        }

        .btn-primary {
            background: #2563eb;
            color: #ffffff;
        }

        .btn-secondary {
            margin-top: 10px;
            background: #e2e8f0;
            color: #0f172a;
        }

        .note {
            margin-top: 12px;
            font-size: 12px;
            line-height: 1.6;
            color: #64748b;
        }

        .status {
            margin-top: 12px;
            min-height: 18px;
            font-size: 12px;
            color: #0f766e;
        }
    </style>
</head>
<body>
    <div class="shell">
        <div class="header">
            <div class="title">LLaMb Page Analyzer</div>
            <div class="subtitle">
                Capture the current page context and render result cards at the very top of the page.
            </div>
        </div>

        <div class="panel">
            <button class="btn btn-primary" id="analyze-page-btn">Analyze Current Page</button>
            <button class="btn btn-secondary" id="open-settings-btn">Open Settings</button>
            <div class="note">
                If mock analysis is enabled, the extension will generate local demo cards without calling a real backend.
            </div>
            <div class="status" id="status"></div>
        </div>
    </div>

    <script src="popup.js"></script>
</body>
</html>
